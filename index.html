<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background Changer</title>
    <link rel="stylesheet" href="css\style.css">
</head>
<body>

<div class="container">
    <h1>Background Studio</h1>
    <p>Choose a background style</p>

    <div class="buttons">
        <button onclick="setColor('#1abc9c')">Mint</button>
        <button onclick="setColor('#3498db')">Ocean</button>
        <button onclick="setColor('#9b59b6')">Purple</button>
        <button onclick="setGradient()">Gradient</button>
        <button onclick="setImage()">Image</button>
        <button onclick="resetBg()">Reset</button>
    </div>
</div>

<script src="js\script.js"></script>
</body>
</html>
