<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Studio</title>
    <link rel="stylesheet" href="css\style.css">
</head>
<body>

<!-- Animated Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="wrapper">
    <div class="container">
        <h1>Background Studio</h1>
        <p>Create your animated background</p>

        <div class="buttons">
            <button onclick="setRandomGradient()">Gradient</button>
            <button onclick="setImage()">Image</button>
            <button onclick="startAuto()">Auto</button>
            <button onclick="stopAuto()">Stop</button>
        </div>

        <div class="controls">
            <input type="color" onchange="setCustomColor(this.value)">
            
            <label class="upload">
                Upload
                <input type="file" accept="image/*" onchange="uploadImage(event)">
            </label>

            <button class="save" onclick="saveBg()">Save</button>
        </div>

        <div class="footer">
            <button onclick="toggleTheme()">🌙 Theme</button>
            <button onclick="resetBg()">Reset</button>
        </div>
    </div>
</div>

<script src="js\script.js"></script>
</body>
</html>
